<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- Google fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
     <style>
        *{
            font-family: "Geist", sans-serif;
        }
     </style>

    <!-- Daisy ui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


</head>


  <body class="bg-[#F8FAFC] px-8 md:px-36 lg:px-60 py-14 mx-auto">
    <!-- Stats Section -->
    <section>
      <h1 class="text-3xl text-[#002C5C] font-bold mb-5">
        Job Application Tracker
      </h1>
      <div class="flex flex-row gap-4">
        <div
          class="bg-base-100 shadow-sm p-5 my-auto rounded-md w-full text-center lg:text-left"
        >
          <h2 class="text-md font-medium text-[#323B49]">Total</h2>
          <p id="total-amount" class="text-3xl font-bold text-[#002C5C]"></p>
        </div>
        <div
          class="bg-base-100 shadow-sm p-5 my-auto rounded-md w-full text-center lg:text-left"
        >
          <h2 class="text-md font-medium text-[#323B49]">Interview</h2>
          <p id="interview-amount" class="text-3xl font-bold text-green-600">
            0
          </p>
        </div>
        <div
          class="bg-base-100 shadow-sm p-5 my-auto rounded-md w-full text-center lg:text-left"
        >
          <h2 class="text-md font-medium text-[#323B49]">Rejected</h2>
          <p id="rejected-amount" class="text-3xl font-bold text-red-600">0</p>
        </div>
      </div>
    </section>

    <hr class="my-8 border-[#E6E7E9]" />

    <!-- Jobs Section -->
    <section>
      <div class="flex flex-row justify-between">
        <h2 class="text-xl text-[#002C5C] font-bold mb-5">Available Jobs</h2>
        <p class="text-base text-[#64748B] font-medium">
          <span id="job-count">8</span> jobs
        </p>
      </div>
      <div class="flex flex-row gap-2 mb-4">
        <button id="all" onClick="tabChange('pending')" class="btn btn-primary">
          All
        </button>
        <button id="int" onClick="tabChange('interview')" class="btn">
          Interview
        </button>
        <button id="rjct" onClick="tabChange('reject')" class="btn">
          Rejected
        </button>
      </div>
      <div id="jobs" class="flex flex-col gap-4"></div>
    </section>

    <script src="./script.js"></script>
  </body>
</html>
