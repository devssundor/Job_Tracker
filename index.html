<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- Google fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
     <style>
        *{
            font-family: "Geist", sans-serif;
        }
     </style>

    <!-- Daisy ui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


</head>
<body>
    <!-- Header section  -->
     <header class="">
        <h1 class="text-3xl mb-5 font-bold text-[#002C5C]">Job Application Tracker</h1>
        <div class="flex flex-row gap-4">
            <div class="p-5 my-auto bg-base-100 shadow-sm rounded-md w-full text-center lg:text-left">
                <h2 class="text-md font-medium text-[#323B49]">Total</h2>
                <p id="total-amount" class="text-3xl font-bold text-[#002C5C]">0</p>
            </div>
            <div class="p-5 my-auto bg-base-100 shadow-sm rounded-md w-full text-center lg:text-left">
                <h2 class="text-md font-medium text-[#323B49]">Interview</h2>
                <p id="interview-amount" class="text-3xl font-bold text-[#002C5C]">0</p>
            </div>
            <div class="p-5 my-auto bg-base-100 shadow-sm rounded-md w-full text-center lg:text-left">
                <h2 class="text-md font-medium text-[#323B49]">Rejected</h2>
                <p id="rejected amount" class="text-3xl font-bold text-[#002C5C]">0</p>
            </div>
        </div>
     </header>

     <hr class="my-8 border-[#E6E7E9]">

     <!-- Job section  -->
      <section>
        <div class="flex flex-row justify-between">
            <h2 class="text-xl font-bold mb-5 text-[#002C5C]">
                Available Jobs
            </h2>
            <p class="text-base font-medium text-[#647488]">
                <span id="job-count">8</span>jobs
            </p>
        </div>
        <div>
            <button id="" onclick="" class="btn btn-primary">All</button>
            <button id="" onclick="" class="btn ">Interview</button>
            <button id="" onclick="" class="btn ">Rejected</button>
        </div>
      </section>

    <script type="module" src="./script.js"></script>
</body>
</html>
